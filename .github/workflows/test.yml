name: API Tests                    # Workflow name

on: [push]                         # Trigger on every push

jobs:
  test:
    runs-on: ubuntu-latest         # Run on Ubuntu
    defaults:
      run:
        working-directory: api_test_project

    services:                      # Spin up dependent Docker services
      restful-booker:
        image: mwinteringham/restfulbooker:latest
        ports:
          - 3001:3001

    steps:
      - uses: actions/checkout@v4            # Check out the repo
      - uses: actions/setup-python@v5        # Install Python
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt # Install dependencies
      - run: pytest tests/ -v --alluredir=reports/allure-results  # Run the test suite
